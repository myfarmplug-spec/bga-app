<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BGA — Business Generator Africa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #06060e; color: #e2e8f0; min-height: 100vh; }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 48px; border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(10,10,20,0.9);
    }
    .nav-logo {
      font-size: 18px; font-weight: 900; letter-spacing: -0.01em;
      background: linear-gradient(135deg, #f1f5f9 30%, #a78bfa 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero {
      text-align: center; padding: 120px 24px 80px;
      background: radial-gradient(ellipse at 50% 0%, rgba(109,40,217,0.2) 0%, transparent 65%);
    }
    .hero-title {
      font-size: clamp(40px, 7vw, 80px); font-weight: 900;
      line-height: 1.1; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #f1f5f9 40%, #a78bfa 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }
    .hero-sub { font-size: 18px; color: #9ca3af; line-height: 1.7; max-width: 560px; margin: 0 auto; }
    .businesses { max-width: 960px; margin: 0 auto; padding: 60px 24px; }
    .businesses-label {
      font-size: 11px; font-weight: 700; color: #6b7280;
      letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 20px;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .biz-card {
      display: block;
      background: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(139,92,246,0.04));
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px; padding: 20px 22px;
      text-decoration: none; color: inherit;
      transition: border-color 0.2s, transform 0.2s;
    }
    .biz-card:hover { border-color: rgba(139,92,246,0.35); transform: translateY(-2px); }
    .biz-name { font-size: 15px; font-weight: 700; color: #f1f5f9; margin-bottom: 5px; }
    .biz-tagline { font-size: 12px; color: #6b7280; line-height: 1.5; }
    .biz-arrow { margin-top: 14px; font-size: 12px; color: #a78bfa; font-weight: 600; }
    footer { text-align: center; padding: 40px 24px; border-top: 1px solid rgba(255,255,255,0.06); font-size: 13px; color: #374151; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.5s ease both; }
    @media (max-width: 600px) { nav { padding: 16px 20px; } .hero { padding: 80px 20px 60px; } }
  </style>
</head>
<body>
<nav><div class="nav-logo">BGA — Business Generator Africa</div></nav>
<div class="hero fade-in">
  <div class="hero-title">African businesses,<br/>built by AI.</div>
  <div class="hero-sub">BGA turns a simple idea into a complete, launch-ready business — name, products, contact, and a live website.</div>
</div>
<div class="businesses fade-in" id="biz-section" style="display:none">
  <div class="businesses-label">Live Businesses</div>
  <div class="grid" id="grid"></div>
</div>
<footer>Powered by BGA &mdash; Business Generator Africa</footer>
<script>
  (function () {
    function esc(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
    fetch("/data/_index.json")
      .then(r => r.ok ? r.json() : [])
      .then(list => {
        if (!list || !list.length) return;
        document.getElementById("biz-section").style.display = "";
        document.getElementById("grid").innerHTML = list.map(item =>
          '<a class="biz-card" href="/' + item.slug + '">' +
          '<div class="biz-name">' + esc(item.name) + '</div>' +
          '<div class="biz-tagline">' + esc(item.tagline) + '</div>' +
          '<div class="biz-arrow">View website →</div></a>'
        ).join("");
      })
      .catch(() => {});
  })();
</script>
</body>
</html>
